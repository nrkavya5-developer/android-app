<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaale-Vikas | Rural School Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        .bottom-sheet { border-radius: 24px 24px 0 0; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .progress-bar { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body x-data="app()" :class="isDark ? 'bg-[#0F172A] text-white' : 'bg-[#F8FAFC] text-[#0F172A]'">

    <!-- TOAST NOTIFICATION -->
    <div x-show="toast.show" x-transition 
         class="fixed top-10 left-1/2 -translate-x-1/2 z-[100] bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl text-sm font-bold"
         x-text="toast.msg"></div>

    <!-- MAIN CONTAINER -->
    <div class="max-w-md mx-auto min-h-screen relative pb-24">

        <!-- 1. LANDING SCREEN -->
        <template x-if="currentScreen === 'Landing'">
            <div class="flex flex-col items-center justify-center min-h-screen p-8 text-center">
                <div class="w-24 h-24 rounded-full flex items-center justify-center mb-6" :class="isDark ? 'bg-blue-500/20' : 'bg-blue-100'">
                    <i class="fas fa-star text-4xl text-blue-600"></i>
                </div>
                <h1 class="text-4xl font-black mb-4">Shaale-Vikas</h1>
                <p class="text-gray-500 mb-10">The transparent bridge connecting Rural Schools with Global Alumni.</p>
                
                <button @click="openLogin('Admin')" class="w-full h-14 rounded-2xl bg-[#1E293B] text-white font-bold mb-4 flex items-center justify-center gap-3">
                    <i class="fas fa-user-tie"></i> Login as Headmaster
                </button>
                <button @click="openLogin('Alumni')" class="w-full h-14 rounded-2xl bg-blue-600 text-white font-bold flex items-center justify-center gap-3">
                    <i class="fas fa-graduation-cap"></i> Login as Alumni
                </button>
            </div>
        </template>

        <!-- 2. REGISTRATION SCREEN -->
        <template x-if="currentScreen === 'Login'">
            <div class="p-6">
                <div class="flex items-center mb-8 pt-4">
                    <button @click="currentScreen = 'Landing'"><i class="fas fa-arrow-left text-xl"></i></button>
                    <h2 class="text-2xl font-black ml-4" x-text="loginTitle"></h2>
                </div>
                <p class="text-gray-500 mb-8">Create your account to proceed.</p>
                <div class="space-y-4">
                    <input type="text" placeholder="Full Name" class="w-full p-4 rounded-2xl border bg-transparent" :class="isDark ? 'border-gray-700' : 'border-gray-300'">
                    <input type="text" :placeholder="loginField" class="w-full p-4 rounded-2xl border bg-transparent" :class="isDark ? 'border-gray-700' : 'border-gray-300'">
                    <input type="email" placeholder="Email Address" class="w-full p-4 rounded-2xl border bg-transparent" :class="isDark ? 'border-gray-700' : 'border-gray-300'">
                    <input type="password" placeholder="Create Password" class="w-full p-4 rounded-2xl border bg-transparent" :class="isDark ? 'border-gray-700' : 'border-gray-300'">
                </div>
                <button @click="handleLogin" class="w-full h-14 rounded-2xl bg-blue-600 text-white font-bold mt-10">
                    Join Network
                </button>
            </div>
        </template>

        <!-- 3. DASHBOARD (Admin Only) -->
        <template x-if="currentScreen === 'Dash'">
            <div class="p-6">
                <h2 class="text-2xl font-black mb-6">School Dashboard</h2>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="p-4 rounded-3xl shadow-sm" :class="isDark ? 'bg-[#1E293B]' : 'bg-white'">
                        <i class="fas fa-hand-holding-heart text-emerald-500 text-2xl mb-4"></i>
                        <p class="text-[10px] font-bold text-gray-500 uppercase">Funds Received</p>
                        <p class="text-2xl font-black">₹1.4L</p>
                    </div>
                    <div class="p-4 rounded-3xl shadow-sm" :class="isDark ? 'bg-[#1E293B]' : 'bg-white'">
                        <i class="fas fa-check-circle text-blue-500 text-2xl mb-4"></i>
                        <p class="text-[10px] font-bold text-gray-500 uppercase">Problems Solved</p>
                        <p class="text-2xl font-black">12</p>
                    </div>
                </div>
                <h3 class="font-bold mb-4">Recent Activity</h3>
                <div class="p-4 rounded-2xl flex items-center gap-4" :class="isDark ? 'bg-[#1E293B]' : 'bg-white'">
                    <div class="w-12 h-12 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-600">
                        <i class="fas fa-paper-plane"></i>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-bold">Ramesh Kumar donated</p>
                        <p class="text-xs text-gray-500">Towards Toilet Renovation</p>
                    </div>
                    <p class="font-bold text-emerald-500">+₹5,000</p>
                </div>
            </div>
        </template>

        <!-- 4. NEEDS SCREEN -->
        <template x-if="currentScreen === 'Needs'">
            <div class="p-6">
                <div class="relative mb-6" x-show="currentRole === 'Alumni'">
                    <i class="fas fa-search absolute left-4 top-4 text-gray-400"></i>
                    <input type="text" x-model="search" placeholder="Search schools or problems..." class="w-full pl-12 p-4 rounded-2xl border bg-transparent" :class="isDark ? 'border-gray-700' : 'border-gray-300'">
                </div>
                <h2 class="text-2xl font-black mb-6" x-text="currentRole === 'Alumni' ? 'Global School Needs' : 'Your Active Requests'"></h2>
                
                <div class="space-y-6">
                    <template x-for="need in filteredNeeds" :key="need.id">
                        <div @click="viewNeed(need)" class="rounded-[32px] overflow-hidden shadow-sm cursor-pointer" :class="isDark ? 'bg-[#1E293B]' : 'bg-white'">
                            <div class="h-44 relative bg-gray-300">
                                <img :src="need.image" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                                <span x-show="need.urgent" class="absolute top-4 left-4 bg-red-600 text-white text-[10px] font-black px-2 py-1 rounded">URGENT</span>
                                <span class="absolute bottom-4 right-4 text-white text-xs font-bold" x-text="need.school"></span>
                            </div>
                            <div class="p-5">
                                <h3 class="text-lg font-black" x-text="need.title"></h3>
                                <p class="text-gray-500 text-sm mt-2 line-clamp-2" x-text="need.desc"></p>
                                <div class="mt-4 flex justify-between text-[10px] font-bold">
                                    <span class="text-emerald-500" x-text="Math.round((need.collected/need.target)*100) + '% Funded'"></span>
                                    <span class="text-gray-500" x-text="'₹' + need.target"></span>
                                </div>
                                <div class="w-full h-2 bg-gray-200 rounded-full mt-2 overflow-hidden">
                                    <div class="h-full bg-emerald-500 progress-bar" :style="'width: ' + (need.collected/need.target*100) + '%'"></div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- 5. NEED DETAIL SCREEN -->
        <template x-if="currentScreen === 'NeedDetail'">
            <div class="relative">
                <div class="h-64 relative">
                    <img :src="activeNeed.image" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-black/40"></div>
                    <button @click="currentScreen = 'Needs'" class="absolute top-6 left-6 w-10 h-10 bg-black/20 rounded-full text-white backdrop-blur-md">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div class="absolute bottom-8 left-6">
                        <span x-show="activeNeed.urgent" class="bg-red-600 text-white text-[10px] font-black px-2 py-1 rounded mb-2 inline-block">URGENT</span>
                        <h2 class="text-2xl font-black text-white" x-text="activeNeed.title"></h2>
                        <p class="text-gray-300 text-sm"><i class="fas fa-school mr-2"></i><span x-text="activeNeed.school"></span></p>
                    </div>
                </div>
                <div class="p-6 -mt-6 bg-[#F8FAFC] rounded-t-[32px] min-h-screen" :class="isDark ? 'bg-[#0F172A]' : 'bg-[#F8FAFC]'">
                    <h4 class="font-bold mb-2">Problem Description</h4>
                    <p class="text-gray-500 text-sm leading-relaxed mb-6" x-text="activeNeed.desc"></p>
                    
                    <div class="p-4 rounded-2xl bg-blue-500/10 flex items-center justify-between mb-6">
                        <div>
                            <p class="text-blue-600 font-bold text-sm">Need more details?</p>
                            <p class="text-xs text-gray-500">Contact school directly.</p>
                        </div>
                        <button class="w-10 h-10 bg-white rounded-full text-blue-600 shadow-sm"><i class="fas fa-phone"></i></button>
                    </div>

                    <div class="p-6 rounded-3xl border mb-10" :class="isDark ? 'bg-[#1E293B] border-gray-700' : 'bg-white border-gray-100'">
                        <p class="text-[10px] font-bold text-gray-500 uppercase mb-4">Funding Progress</p>
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-2xl font-black text-emerald-500" x-text="'₹' + activeNeed.collected"></p>
                                <p class="text-xs text-gray-500">Raised so far</p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-bold" x-text="'₹' + activeNeed.target"></p>
                                <p class="text-xs text-gray-500">Goal Amount</p>
                            </div>
                        </div>
                        <div class="w-full h-3 bg-gray-200 rounded-full mt-4 overflow-hidden">
                            <div class="h-full bg-emerald-500" :style="'width: ' + (activeNeed.collected/activeNeed.target*100) + '%'"></div>
                        </div>
                    </div>

                    <button x-show="currentRole === 'Alumni'" @click="showDonate = true" class="w-full h-14 bg-blue-600 text-white rounded-2xl font-bold text-lg shadow-lg">
                        Donate to this Cause
                    </button>
                </div>
            </div>
        </template>

        <!-- 6. IMPACT SCREEN -->
        <template x-if="currentScreen === 'Impact'">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black">Global Impact</h2>
                    <button x-show="currentRole === 'Admin'" @click="showAddImpact = true" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-xs font-bold">
                        + Add Impact
                    </button>
                </div>
                <div class="space-y-6">
                    <template x-for="item in impacts" :key="item.id">
                        <div class="p-5 rounded-[32px] shadow-sm" :class="isDark ? 'bg-[#1E293B]' : 'bg-white'">
                            <h3 class="font-bold" x-text="item.title"></h3>
                            <p class="text-emerald-500 text-[10px] font-black mt-1 uppercase" x-text="'Completed • ' + item.school"></p>
                            <div class="grid grid-cols-2 gap-2 mt-4">
                                <div class="h-28 relative rounded-2xl overflow-hidden bg-gray-200">
                                    <img :src="item.before" class="w-full h-full object-cover">
                                    <span class="absolute bottom-2 left-2 bg-black/60 text-white text-[8px] font-black px-2 py-1 rounded">BEFORE</span>
                                </div>
                                <div class="h-28 relative rounded-2xl overflow-hidden bg-gray-200">
                                    <img :src="item.after" class="w-full h-full object-cover">
                                    <span class="absolute bottom-2 right-2 bg-emerald-500 text-white text-[8px] font-black px-2 py-1 rounded">AFTER</span>
                                </div>
                            </div>
                            <p class="mt-4 text-xs text-gray-500 bg-gray-500/5 p-3 rounded-xl" x-text="item.desc"></p>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- 7. DONORS SCREEN -->
        <template x-if="currentScreen === 'Donors'">
            <div class="p-6">
                <div class="p-8 rounded-[32px] bg-gradient-to-br from-amber-400 to-orange-500 text-white text-center mb-8">
                    <i class="fas fa-star text-4xl opacity-50 mb-2"></i>
                    <h2 class="text-3xl font-black">Hall of Fame</h2>
                    <p class="text-sm opacity-90">Honoring global supporters</p>
                </div>
                <div class="rounded-3xl overflow-hidden shadow-sm" :class="isDark ? 'bg-[#1E293B]' : 'bg-white'">
                    <template x-for="(donor, index) in donors">
                        <div class="p-4 flex items-center gap-4 border-b border-gray-500/10 last:border-0">
                            <span class="w-6 text-xl font-black" :class="index === 0 ? 'text-amber-500' : 'text-gray-400'" x-text="index + 1"></span>
                            <div class="w-12 h-12 rounded-full bg-gray-200 flex items-center justify-center text-gray-400">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="flex-1">
                                <p class="font-bold" x-text="donor.name"></p>
                                <p class="text-[10px] text-gray-500" x-text="donor.supported"></p>
                            </div>
                            <span class="px-3 py-1 bg-emerald-500/10 text-emerald-500 rounded-lg font-black text-[10px]" x-text="donor.amount"></span>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- 8. SETTINGS SCREEN -->
        <template x-if="currentScreen === 'Settings'">
            <div class="p-6 space-y-8">
                <h2 class="text-2xl font-black">Account Settings</h2>
                
                <section>
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-4 ml-2">Profile Information</p>
                    <div class="rounded-3xl overflow-hidden" :class="isDark ? 'bg-[#1E293B]' : 'bg-white'">
                        <div class="p-5 flex items-center gap-4">
                            <div class="w-14 h-14 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-600 text-xl">
                                <i class="fas fa-user"></i>
                            </div>
                            <div>
                                <p class="font-bold text-lg" x-text="currentRole === 'Admin' ? 'Ramesh K.' : 'Priya Sharma'"></p>
                                <p class="text-xs text-gray-500" x-text="currentRole === 'Admin' ? 'Headmaster • GHS Malgudi' : 'Alumni • IT Professional'"></p>
                            </div>
                        </div>
                        <div @click="showToastMsg('Edit Profile Opened')" class="p-4 border-t border-gray-500/10 flex justify-between items-center text-sm cursor-pointer">
                            <span class="flex items-center gap-3"><i class="fas fa-edit text-gray-400"></i> Edit Profile</span>
                            <i class="fas fa-chevron-right text-gray-300"></i>
                        </div>
                    </div>
                </section>

                <section>
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-4 ml-2">App Preferences</p>
                    <div class="rounded-3xl overflow-hidden" :class="isDark ? 'bg-[#1E293B]' : 'bg-white'">
                        <div class="p-4 flex justify-between items-center text-sm">
                            <span class="flex items-center gap-3"><i class="fas fa-moon text-gray-400"></i> Dark Mode</span>
                            <button @click="isDark = !isDark" class="w-12 h-6 rounded-full relative transition-colors" :class="isDark ? 'bg-blue-600' : 'bg-gray-300'">
                                <div class="absolute top-1 w-4 h-4 bg-white rounded-full transition-all" :class="isDark ? 'left-7' : 'left-1'"></div>
                            </button>
                        </div>
                        <div class="p-4 border-t border-gray-500/10 flex justify-between items-center text-sm">
                            <span class="flex items-center gap-3"><i class="fas fa-bell text-gray-400"></i> Notifications</span>
                            <button class="w-12 h-6 bg-blue-600 rounded-full relative"><div class="absolute top-1 left-7 w-4 h-4 bg-white rounded-full"></div></button>
                        </div>
                    </div>
                </section>

                <button @click="logout" class="w-full h-14 rounded-2xl bg-red-500/10 text-red-500 font-bold">
                    Secure Logout
                </button>
            </div>
        </template>

        <!-- NAVIGATION BAR -->
        <nav x-show="currentRole !== 'None' && currentScreen !== 'Landing' && currentScreen !== 'Login' && currentScreen !== 'NeedDetail'" 
             class="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-20 border-t flex items-center justify-around z-40 backdrop-blur-lg"
             :class="isDark ? 'bg-[#1E293B]/90 border-gray-800' : 'bg-white/90 border-gray-100'">
            
            <button x-show="currentRole === 'Admin'" @click="currentScreen = 'Dash'" class="flex flex-col items-center gap-1" :class="currentScreen === 'Dash' ? 'text-blue-600' : 'text-gray-400'">
                <i class="fas fa-home text-lg"></i><span class="text-[10px] font-bold">Dash</span>
            </button>
            <button @click="currentScreen = 'Needs'" class="flex flex-col items-center gap-1" :class="currentScreen === 'Needs' ? 'text-blue-600' : 'text-gray-400'">
                <i class="fas fa-list text-lg"></i><span class="text-[10px] font-bold">Needs</span>
            </button>
            <button @click="currentScreen = 'Impact'" class="flex flex-col items-center gap-1" :class="currentScreen === 'Impact' ? 'text-blue-600' : 'text-gray-400'">
                <i class="fas fa-check-circle text-lg"></i><span class="text-[10px] font-bold">Impact</span>
            </button>
            <button @click="currentScreen = 'Donors'" class="flex flex-col items-center gap-1" :class="currentScreen === 'Donors' ? 'text-blue-600' : 'text-gray-400'">
                <i class="fas fa-trophy text-lg"></i><span class="text-[10px] font-bold">Donors</span>
            </button>
            <button @click="currentScreen = 'Settings'" class="flex flex-col items-center gap-1" :class="currentScreen === 'Settings' ? 'text-blue-600' : 'text-gray-400'">
                <i class="fas fa-cog text-lg"></i><span class="text-[10px] font-bold">Settings</span>
            </button>
        </nav>

        <!-- FAB (Admin) -->
        <button x-show="currentRole === 'Admin' && currentScreen === 'Needs'" 
                @click="showAddNeed = true"
                class="fixed bottom-24 right-6 w-14 h-14 bg-blue-600 text-white rounded-2xl shadow-xl z-40">
            <i class="fas fa-plus text-xl"></i>
        </button>

        <!-- MODAL: DONATE -->
        <div x-show="showDonate" class="fixed inset-0 z-50 flex flex-col justify-end bg-black/50">
            <div @click.away="showDonate = false" class="bottom-sheet p-8 shadow-2xl" :class="isDark ? 'bg-[#1E293B]' : 'bg-white'">
                <h3 class="text-2xl font-black mb-2">Donate Funds</h3>
                <p class="text-gray-500 text-sm mb-8">Enter the amount you wish to donate. Every rupee helps!</p>
                <input type="number" x-model="donateAmount" placeholder="Amount (₹)" class="w-full text-3xl font-black p-4 bg-transparent border-b-2 border-blue-600 outline-none mb-10">
                <button @click="handleDonate" class="w-full h-14 bg-blue-600 text-white rounded-2xl font-bold">Confirm Donation</button>
            </div>
        </div>

        <!-- MODAL: ADD NEED -->
        <div x-show="showAddNeed" class="fixed inset-0 z-50 flex flex-col justify-end bg-black/50 overflow-y-auto">
            <div @click.away="showAddNeed = false" class="bottom-sheet p-8 shadow-2xl" :class="isDark ? 'bg-[#1E293B]' : 'bg-white'">
                <h3 class="text-xl font-black mb-6">Post School Need</h3>
                <div class="space-y-4">
                    <div class="h-32 bg-blue-500/10 rounded-2xl border-2 border-dashed border-blue-600/30 flex flex-col items-center justify-center text-blue-600 cursor-pointer">
                        <i class="fas fa-plus mb-2"></i><span class="text-xs font-bold uppercase">Upload Photo</span>
                    </div>
                    <input type="text" x-model="newNeed.title" placeholder="Problem Title" class="w-full p-4 rounded-xl border bg-transparent">
                    <textarea x-model="newNeed.desc" placeholder="Detailed Description" class="w-full p-4 rounded-xl border bg-transparent h-24"></textarea>
                    <input type="number" x-model="newNeed.target" placeholder="Funds Needed (₹)" class="w-full p-4 rounded-xl border bg-transparent">
                    <button @click="submitNeed" class="w-full h-14 bg-blue-600 text-white rounded-2xl font-bold">Publish to Alumni</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        function app() {
            return {
                currentScreen: 'Landing',
                currentRole: 'None',
                isDark: false,
                search: '',
                toast: { show: false, msg: '' },
                showDonate: false,
                showAddNeed: false,
                showAddImpact: false,
                donateAmount: '',
                activeNeed: null,
                loginTitle: '',
                loginField: '',
                newNeed: { title: '', desc: '', target: '' },
                
                needs: [
                    { id: 1, school: "GHS Malgudi", title: "Fix Leaking Roof (Class 5)", desc: "Rainwater is leaking heavily causing damage to desks. We need funds for waterproofing materials.", target: 10000, collected: 6000, urgent: true, image: 'https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&w=400' },
                    { id: 2, school: "Govt Primary, Hassan", title: "Science Lab Microscopes", desc: "Our students need practical experience. Requesting funds for 5 basic light microscopes.", target: 25000, collected: 5000, urgent: false, image: 'https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&w=400' }
                ],
                impacts: [
                    { id: 1, title: "Toilet Renovation", school: "GHS Malgudi", desc: "Safe and hygienic sanitation facilities built for 150 girls.", before: 'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=200', after: 'https://images.unsplash.com/photo-1620629761711-7664e3c98f3b?auto=format&fit=crop&w=200' },
                    { id: 2, title: "New Smart Boards", school: "ZPHS Hubli", desc: "Interactive boards installed to improve digital literacy.", before: 'https://images.unsplash.com/photo-1580582932707-520aed937b7b?auto=format&fit=crop&w=200', after: 'https://images.unsplash.com/photo-1577891729319-8285c6513832?auto=format&fit=crop&w=200' }
                ],
                donors: [
                    { name: "Ramesh Kumar", supported: "Supported GHS Malgudi", amount: "₹45k" },
                    { name: "Priya Sharma", supported: "Supported ZPHS Hubli", amount: "₹30k" },
                    { name: "Anonymous", supported: "Supported Hassan Primary", amount: "Items" }
                ],

                get filteredNeeds() {
                    if (!this.search) return this.needs;
                    return this.needs.filter(n => n.title.toLowerCase().includes(this.search.toLowerCase()) || n.school.toLowerCase().includes(this.search.toLowerCase()));
                },

                showToastMsg(msg) {
                    this.toast.msg = msg;
                    this.toast.show = true;
                    setTimeout(() => this.toast.show = false, 3000);
                },

                openLogin(role) {
                    this.currentRole = role;
                    this.loginTitle = role === 'Admin' ? 'School Registration' : 'Alumni Registration';
                    this.loginField = role === 'Admin' ? 'Official UDISE Code' : 'Passing Year';
                    this.currentScreen = 'Login';
                },

                handleLogin() {
                    this.currentScreen = this.currentRole === 'Admin' ? 'Dash' : 'Needs';
                    this.showToastMsg('Logged in as ' + this.currentRole);
                },

                viewNeed(need) {
                    this.activeNeed = need;
                    this.currentScreen = 'NeedDetail';
                },

                handleDonate() {
                    if (!this.donateAmount) return;
                    this.activeNeed.collected += parseInt(this.donateAmount);
                    this.showDonate = false;
                    this.showToastMsg('Awesome! You donated ₹' + this.donateAmount);
                    this.donateAmount = '';
                },

                submitNeed() {
                    const id = this.needs.length + 1;
                    this.needs.unshift({
                        id: id,
                        school: "GHS Malgudi",
                        title: this.newNeed.title,
                        desc: this.newNeed.desc,
                        target: parseInt(this.newNeed.target),
                        collected: 0,
                        urgent: true,
                        image: 'https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&w=400'
                    });
                    this.showAddNeed = false;
                    this.showToastMsg('Problem Published Globally!');
                    this.newNeed = { title: '', desc: '', target: '' };
                },

                logout() {
                    this.currentRole = 'None';
                    this.currentScreen = 'Landing';
                    this.showToastMsg('Securely Logged Out');
                }
            }
        }
    </script>
</body>
</html>
